<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style/Styles.css">

<title>Contacto</title>

</head>

<body>

<header>

<h1>CONTACTO</h1>

<p>Formulario para comunicarse con el blog de música latinoamericana</p>

</header>

<nav>

<a href="index.html">Inicio</a>
<a href="Cumbia.html">Cumbia</a>
<a href="Salsa.html">Salsa</a>
<a href="Mariachi.html">Mariachi</a>
<a href="Tango.html">Tango</a>
<a href="Reguetón.html">Reguetón</a>
<a href="contacto.html">Contacto</a>

</nav>

<section>

<h2>Formulario de contacto</h2>

<form>

<p>

<label>Nombre:</label><br>
<input type="text" name="nombre" required>

</p>

<p>

<label>Correo electrónico:</label><br>
<input type="email" name="correo" required>

</p>

<p>

<label>Edad:</label><br>
<input type="number" name="edad">

</p>

<p>

<label>Género musical favorito:</label><br>

<select name="genero">

<option>Cumbia</option>
<option>Salsa</option>
<option>Mariachi</option>
<option>Tango</option>
<option>Reguetón</option>

</select>

</p>

<p>

<label>¿Te gusta la música latinoamericana?</label><br>

<input type="radio" name="gusto"> Sí
<input type="radio" name="gusto"> No

</p>

<p>

<label>¿Qué géneros escuchas?</label><br>

<input type="checkbox"> Cumbia<br>
<input type="checkbox"> Salsa<br>
<input type="checkbox"> Mariachi<br>
<input type="checkbox"> Tango<br>
<input type="checkbox"> Reguetón

</p>

<p>

<label>Comentario:</label><br>

<textarea rows="5" cols="40"></textarea>

</p>

<p>

<input type="submit" value="Enviar">

</p>

</form>

</section>

<footer>

<p><small>Blog educativo sobre música latinoamericana</small></p>

</footer>

</body>

</html>
